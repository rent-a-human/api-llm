<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Production-quality 3D flight tracking web application with real-time aircraft visualization" />
    <meta name="keywords" content="flight tracking, 3D visualization, aircraft, aviation, real-time, OpenSky Network" />
    <title>Flight Tracker 3D - Real-time Global Flight Monitoring</title>
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://opensky-network.org">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e293b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flight Tracker 3D" />
    
    <!-- OpenGraph Meta Tags -->
    <meta property="og:title" content="Flight Tracker 3D - Real-time Global Flight Monitoring" />
    <meta property="og:description" content="Production-quality 3D flight tracking web application with real-time aircraft visualization on an interactive 3D Earth." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Flight Tracker 3D" />
    <meta name="twitter:description" content="Real-time global flight monitoring in 3D" />
    
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #1e293b 0%, #1e3a8a 50%, #1e293b 100%);
        color: white;
        overflow: hidden;
      }
      
      #root {
        width: 100vw;
        height: 100vh;
      }
      
      /* Loading spinner */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1e293b 0%, #1e3a8a 50%, #1e293b 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loader-content {
        text-align: center;
      }
      
      .loader-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(59, 130, 246, 0.3);
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loader-text {
        color: #e2e8f0;
        font-size: 18px;
        font-weight: 500;
      }
      
      .loader-subtext {
        color: #94a3b8;
        font-size: 14px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial loading screen -->
      <div class="initial-loader" id="initial-loader">
        <div class="loader-content">
          <div class="loader-spinner"></div>
          <div class="loader-text">Flight Tracker 3D</div>
          <div class="loader-subtext">Initializing 3D environment...</div>
        </div>
      </div>
    </div>
    
    <script>
      // Remove initial loader when React app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.5s ease-out';
            setTimeout(() => {
              loader.remove();
            }, 500);
          }
        }, 1000);
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
