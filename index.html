<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turtle Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #2E8B57, #228B22);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #98FB98;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .score-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
            color: #98FB98;
        }

        canvas {
            border: 3px solid #228B22;
            border-radius: 10px;
            background: #1a472a;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 15px;
            text-align: center;
        }

        .control-btn {
            background: #32CD32;
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .control-btn:hover {
            background: #228B22;
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #98FB98;
            text-align: center;
            max-width: 400px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐢 Turtle Snake 🐢</h1>
        <div class="score-container">
            <div>Score: <span id="score">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <button class="control-btn" onclick="startGame()">Start Game</button>
            <button class="control-btn" onclick="pauseGame()">Pause</button>
            <button class="control-btn" onclick="resetGame()">Reset</button>
        </div>
        <div class="instructions">
            <strong>How to Play:</strong><br>
            Use Arrow Keys or WASD to move the turtle<br>
            Eat the red seaweed to grow and score points<br>
            Don't hit the walls or yourself!<br>
            <strong>Controls:</strong> Arrow Keys or WASD
        </div>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Your Turtle hit something!</p>
            <button class="control-btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');

        // Game configuration
        const GRID_SIZE = 30;
        const GRID_WIDTH = canvas.width / GRID_SIZE;
        const GRID_HEIGHT = canvas.height / GRID_SIZE;

        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let highScore = localStorage.getItem('turtleSnakeHighScore') || 0;
        highScoreElement.textContent = highScore;

        // Snake (turtle) properties
        let turtle = [];
        let direction = { x: 1, y: 0 }; // Moving right initially
        let nextDirection = { x: 1, y: 0 };

        // Food (seaweed) properties
        let seaweed = {};

        // Game speed (milliseconds per move)
        let gameSpeed = 150;

        // Initialize game
        function initGame() {
            // Start turtle in the center
            turtle = [
                { x: Math.floor(GRID_WIDTH / 2), y: Math.floor(GRID_HEIGHT / 2) },
                { x: Math.floor(GRID_WIDTH / 2) - 1, y: Math.floor(GRID_HEIGHT / 2) },
                { x: Math.floor(GRID_WIDTH / 2) - 2, y: Math.floor(GRID_HEIGHT / 2) }
            ];
            
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            updateScore();
            generateSeaweed();
        }

        // Generate random seaweed position
        function generateSeaweed() {
            do {
                seaweed = {
                    x: Math.floor(Math.random() * GRID_WIDTH),
                    y: Math.floor(Math.random() * GRID_HEIGHT)
                };
            } while (turtle.some(segment => segment.x === seaweed.x && segment.y === seaweed.y));
        }

        // Draw turtle
        function drawTurtle(segment, isHead = false) {
            const x = segment.x * GRID_SIZE;
            const y = segment.y * GRID_SIZE;

            if (isHead) {
                // Draw turtle head with shell pattern
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x + 2, y + 2, GRID_SIZE - 4, GRID_SIZE - 4);
                
                // Shell pattern
                ctx.fillStyle = '#654321';
                ctx.fillRect(x + 5, y + 5, GRID_SIZE - 10, GRID_SIZE - 10);
                
                // Eyes
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(x + 8, y + 8, 2, 0, 2 * Math.PI);
                ctx.arc(x + GRID_SIZE - 8, y + 8, 2, 0, 2 * Math.PI);
                ctx.fill();
            } else {
                // Draw turtle body segments
                ctx.fillStyle = '#228B22';
                ctx.fillRect(x + 3, y + 3, GRID_SIZE - 6, GRID_SIZE - 6);
                
                // Shell pattern
                ctx.fillStyle = '#32CD32';
                ctx.fillRect(x + 6, y + 6, GRID_SIZE - 12, GRID_SIZE - 12);
            }
        }

        // Draw seaweed
        function drawSeaweed() {
            const x = seaweed.x * GRID_SIZE;
            const y = seaweed.y * GRID_SIZE;
            
            // Draw seaweed as leafy plants
            ctx.fillStyle = '#DC143C';
            ctx.beginPath();
            ctx.ellipse(x + GRID_SIZE/2, y + GRID_SIZE/2, 8, 12, 0, 0, 2 * Math.PI);
            ctx.fill();
            
            // Add some seaweed fronds
            ctx.fillStyle = '#B22222';
            ctx.beginPath();
            ctx.ellipse(x + 10, y + 10, 4, 8, 0.5, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(x + 20, y + 20, 4, 8, -0.5, 0, 2 * Math.PI);
            ctx.fill();
        }

        // Draw game board
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a472a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#2E8B57';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_WIDTH; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= GRID_HEIGHT; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            // Draw seaweed
            drawSeaweed();
            
            // Draw turtle
            turtle.forEach((segment, index) => {
                drawTurtle(segment, index === 0);
            });
        }

        // Update game logic
        function update() {
            if (!gameRunning || gamePaused) return;

            // Update direction
            direction = { ...nextDirection };

            // Move turtle
            const head = { ...turtle[0] };
            head.x += direction.x;
            head.y += direction.y;

            // Check wall collision
            if (head.x < 0 || head.x >= GRID_WIDTH || head.y < 0 || head.y >= GRID_HEIGHT) {
                gameOver();
                return;
            }

            // Check self collision
            if (turtle.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            turtle.unshift(head);

            // Check food collision
            if (head.x === seaweed.x && head.y === seaweed.y) {
                score += 10;
                updateScore();
                generateSeaweed();
                
                // Speed up the game slightly
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                }
            } else {
                turtle.pop();
            }
        }

        // Update score display
        function updateScore() {
            scoreElement.textContent = score;
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('turtleSnakeHighScore', highScore);
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            gameOverElement.style.display = 'block';
        }

        // Start game
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            gameOverElement.style.display = 'none';
            initGame();
            
            if (!gameInterval) {
                gameInterval = setInterval(gameLoop, gameSpeed);
            }
        }

        // Pause game
        function pauseGame() {
            if (gameRunning) {
                gamePaused = !gamePaused;
            }
        }

        // Reset game
        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            gameSpeed = 150;
            gameOverElement.style.display = 'none';
            initGame();
            draw();
            
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            const key = e.key.toLowerCase();
            
            // Prevent reverse direction
            if (key === 'arrowup' || key === 'w') {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            } else if (key === 'arrowdown' || key === 's') {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            } else if (key === 'arrowleft' || key === 'a') {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else if (key === 'arrowright' || key === 'd') {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            } else if (key === ' ') { // Spacebar to pause
                e.preventDefault();
                pauseGame();
            }
        });

        // Main game loop
        function gameLoop() {
            update();
            draw();
        }

        let gameInterval = null;

        // Initialize and draw initial state
        initGame();
        draw();
    </script>
</body>
</html>
